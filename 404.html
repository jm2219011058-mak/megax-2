<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Mega X Holding Ltd.</title>
  
<link rel="icon" href="assets/final-favicon.ico" type="image/x-icon">
<link rel="icon" href="assets/final-favicon.png" type="image/png">
<link rel="apple-touch-icon" href="assets/final-apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800&family=Outfit:wght@400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 14rem);
      font-weight: 800;
      color: var(--color-surface-2);
      line-height: 1;
      margin-bottom: var(--space-md);
    }
    .error-page h2 { margin-bottom: var(--space-md); }
    .error-page p {
      color: var(--color-text-muted);
      margin: 0 auto var(--space-xl);
      max-width: 36ch;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="grid-bg"></div>
    <div class="glow-orb" style="width:400px;height:400px;background:var(--color-accent);top:50%;left:50%;transform:translate(-50%,-50%);"></div>
    <div style="position:relative;z-index:1;">
      <div class="error-code">404</div>
      <h2>Signal Lost</h2>
      <p>The page you're looking for doesn't exist or has been moved to a different frequency.</p>
      <a href="index.html" class="btn btn-primary">Return Home →</a>
    </div>
  </div>
</body>
</html>
